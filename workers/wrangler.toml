name = "jobsentinel-api"
main = "src/index.js"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# Account ID — fill in from `wrangler whoami` or Cloudflare dashboard
# account_id = "YOUR_ACCOUNT_ID"

[vars]
ENVIRONMENT = "production"
API_VERSION = "1.0.0"

# Cloudflare KV namespace for rate limiting
# Create with: wrangler kv:namespace create "RATE_LIMIT"
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "REPLACE_WITH_KV_ID"
preview_id = "REPLACE_WITH_KV_PREVIEW_ID"

# Cloudflare D1 database for scan history and patterns
# Create with: wrangler d1 create jobsentinel-db
[[d1_databases]]
binding = "DB"
database_name = "jobsentinel-db"
database_id = "REPLACE_WITH_D1_DB_ID"

[triggers]
crons = []

# Route configuration — update with your custom domain after deploying
# [routes]
# pattern = "api.yourdomain.com/*"
# zone_name = "yourdomain.com"
