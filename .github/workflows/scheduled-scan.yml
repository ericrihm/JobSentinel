name: Scheduled Job Scan

on:
  schedule:
    # Every 4 hours for fresher data
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      query:
        description: "Search query (default: software engineer)"
        required: false
        default: "software engineer"
      location:
        description: "Location filter (default: empty for all)"
        required: false
        default: ""
      ats_only:
        description: "Only run ATS scrapers (skip aggregator APIs)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  SCAN_QUERY: ${{ github.event.inputs.query || 'software engineer' }}
  SCAN_LOCATION: ${{ github.event.inputs.location || '' }}
  ATS_ONLY: ${{ github.event.inputs.ats_only || 'false' }}

jobs:
  scan:
    name: Fetch & Score Job Postings
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-3.12-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-3.12-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[web]"

      - name: Prepare output directory
        run: mkdir -p scan-results

      - name: Run ingestion pipeline
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          USAJOBS_API_KEY: ${{ secrets.USAJOBS_API_KEY }}
          USAJOBS_EMAIL: ${{ secrets.USAJOBS_EMAIL }}
        run: |
          python - <<'PYEOF'
          import json, os, sys, traceback, hashlib
          from datetime import UTC, datetime
          from pathlib import Path

          sys.path.insert(0, ".")

          run_ts = datetime.now(UTC).isoformat()
          query = os.environ.get("SCAN_QUERY", "software engineer")
          location = os.environ.get("SCAN_LOCATION", "")
          ats_only = os.environ.get("ATS_ONLY", "false") == "true"

          results = {
              "run_timestamp": run_ts,
              "query": query,
              "location": location,
              "sources": [],
              "all_jobs": [],
              "summary": {},
              "errors": [],
          }

          try:
              from sentinel.sources import (
                  RemoteOKSource,
                  AdzunaSource,
                  TheMuseSource,
                  USAJobsSource,
                  RemotiveSource,
                  GreenhouseSource,
                  LeverSource,
                  AshbySource,
                  SmartRecruitersSource,
              )
              from sentinel.registry import get_companies
              from sentinel.signals import extract_signals

              adapters = []

              # ATS sources (direct from company career pages)
              gh_companies = get_companies("greenhouse")
              if gh_companies:
                  adapters.append(GreenhouseSource(companies=gh_companies))

              lever_companies = get_companies("lever")
              if lever_companies:
                  adapters.append(LeverSource(companies=lever_companies))

              ashby_companies = get_companies("ashby")
              if ashby_companies:
                  adapters.append(AshbySource(companies=ashby_companies))

              sr_companies = get_companies("smartrecruiters")
              if sr_companies:
                  adapters.append(SmartRecruitersSource(companies=sr_companies))

              # Aggregator APIs (broader coverage)
              if not ats_only:
                  adapters.append(RemoteOKSource())
                  adapters.append(TheMuseSource())
                  adapters.append(RemotiveSource())

                  adzuna = AdzunaSource()
                  if adzuna.available:
                      adapters.append(adzuna)

                  usajobs = USAJobsSource()
                  if usajobs.available:
                      adapters.append(usajobs)

              total_fetched = 0
              total_safe = 0
              total_suspicious = 0
              total_scam = 0
              seen_urls = set()

              for adapter in adapters:
                  name = adapter.name
                  try:
                      jobs = adapter.fetch(query=query, location=location, limit=50)
                      scored = []
                      for job in jobs:
                          if job.url and job.url in seen_urls:
                              continue
                          if job.url:
                              seen_urls.add(job.url)

                          try:
                              signals = extract_signals(job)
                              signal_count = len([s for s in signals if s.get("triggered")])
                              scam_score = sum(s.get("weight", 0) for s in signals if s.get("triggered")) / max(len(signals), 1)
                              scam_score = max(0.0, min(1.0, scam_score))

                              if scam_score < 0.20:
                                  risk_level = "safe"
                                  total_safe += 1
                              elif scam_score < 0.60:
                                  risk_level = "suspicious"
                                  total_suspicious += 1
                              else:
                                  risk_level = "scam"
                                  total_scam += 1

                              content_hash = hashlib.sha256(
                                  f"{job.title}|{job.company}|{job.description[:500]}".encode()
                              ).hexdigest()[:16]

                              entry = {
                                  "url": job.url,
                                  "title": job.title,
                                  "company": job.company,
                                  "location": job.location,
                                  "description": job.description[:5000],
                                  "salary_min": job.salary_min,
                                  "salary_max": job.salary_max,
                                  "salary_currency": getattr(job, "salary_currency", "USD"),
                                  "employment_type": getattr(job, "employment_type", ""),
                                  "experience_level": getattr(job, "experience_level", ""),
                                  "is_remote": getattr(job, "is_remote", False),
                                  "source": name,
                                  "source_company": getattr(job, "company", ""),
                                  "scam_score": round(scam_score, 4),
                                  "risk_level": risk_level,
                                  "signal_count": signal_count,
                                  "posted_at": getattr(job, "posted_date", ""),
                                  "content_hash": content_hash,
                              }
                              scored.append(entry)
                              results["all_jobs"].append(entry)
                          except Exception as exc:
                              results["errors"].append(f"{name}: score error: {exc}")

                      total_fetched += len(scored)
                      results["sources"].append({
                          "name": name,
                          "jobs_fetched": len(scored),
                          "safe": len([j for j in scored if j["risk_level"] == "safe"]),
                          "suspicious": len([j for j in scored if j["risk_level"] == "suspicious"]),
                          "scam": len([j for j in scored if j["risk_level"] == "scam"]),
                      })
                      print(f"  {name}: {len(scored)} jobs fetched")
                  except Exception:
                      results["errors"].append(f"{name}: fetch error: {traceback.format_exc()}")
                      results["sources"].append({"name": name, "jobs_fetched": 0, "safe": 0, "suspicious": 0, "scam": 0})

              results["summary"] = {
                  "total_fetched": total_fetched,
                  "total_safe": total_safe,
                  "total_suspicious": total_suspicious,
                  "total_scam": total_scam,
                  "sources_queried": len(adapters),
                  "unique_urls": len(seen_urls),
                  "error_count": len(results["errors"]),
              }

          except ImportError as exc:
              results["errors"].append(f"Import error: {exc}")
              results["summary"] = {"total_fetched": 0, "error_count": 1}

          out_path = Path("scan-results") / f"scan_{run_ts[:10]}.json"
          out_path.write_text(json.dumps(results, indent=2, default=str))
          print(f"\nWrote results to {out_path}")
          print(f"Summary: {json.dumps(results['summary'], indent=2)}")

          summary_path = Path("scan-results") / "latest_summary.json"
          summary_path.write_text(json.dumps(results["summary"], indent=2))
          PYEOF

      - name: Write job summary
        if: always()
        run: |
          python - <<'EOF'
          import json, os
          from pathlib import Path

          summary_path = Path("scan-results/latest_summary.json")
          if not summary_path.exists():
              print("No summary file found.")
              exit(0)

          s = json.loads(summary_path.read_text())
          step_summary = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/stdout")

          query    = os.environ.get("SCAN_QUERY", "software engineer")
          location = os.environ.get("SCAN_LOCATION", "") or "all"

          lines = [
              "## Job Scan Results",
              "",
              f"**Query:** `{query}` | **Location:** `{location}`",
              "",
              "| Metric | Value |",
              "|--------|-------|",
              f"| Sources queried | {s.get('sources_queried', 0)} |",
              f"| Jobs fetched    | {s.get('total_fetched', 0)} |",
              f"| Unique URLs     | {s.get('unique_urls', 0)} |",
              f"| Safe (< 0.20)   | {s.get('total_safe', 0)} |",
              f"| Suspicious      | {s.get('total_suspicious', 0)} |",
              f"| Scam (>= 0.60)  | {s.get('total_scam', 0)} |",
              f"| Errors          | {s.get('error_count', 0)} |",
          ]

          detail_path = sorted(Path("scan-results").glob("scan_*.json"))
          if detail_path:
              try:
                  detail = json.loads(detail_path[-1].read_text())
                  lines += ["", "### Per-source breakdown", "", "| Source | Fetched | Safe | Suspicious | Scam |", "|--------|---------|------|------------|------|"]
                  for src in detail.get("sources", []):
                      lines.append(f"| {src['name']} | {src['jobs_fetched']} | {src.get('safe', 0)} | {src.get('suspicious', 0)} | {src.get('scam', 0)} |")
              except Exception:
                  pass

          with open(step_summary, "a") as fh:
              fh.write("\n".join(lines) + "\n")
          EOF

      - name: Upload scan results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-results-${{ github.run_number }}
          path: scan-results/
          retention-days: 30

      - name: Publish verified jobs to website
        run: |
          mkdir -p docs/data
          python3 << 'PYEOF'
          import json, glob
          from datetime import datetime, timezone
          from pathlib import Path

          files = sorted(glob.glob("scan-results/scan_*.json"))
          if not files:
              print("No scan results found, skipping publish")
              exit(0)

          with open(files[-1]) as f:
              data = json.load(f)

          now = datetime.now(timezone.utc).isoformat()
          all_jobs = data.get("all_jobs", [])

          verified = [j for j in all_jobs if j.get("scam_score", 1.0) < 0.20]
          verified.sort(key=lambda j: j["scam_score"])

          stats = {
              "total_scanned": len(all_jobs),
              "total_safe": len([j for j in all_jobs if j.get("scam_score", 1) < 0.20]),
              "total_suspicious": len([j for j in all_jobs if 0.20 <= j.get("scam_score", 1) < 0.60]),
              "total_scam": len([j for j in all_jobs if j.get("scam_score", 1) >= 0.60]),
              "last_scan": now,
              "sources": list({s["name"] for s in data.get("sources", [])}),
          }

          with open("docs/data/verified-jobs.json", "w") as f:
              json.dump({"jobs": verified, "updated": now, "count": len(verified)}, f, indent=2)

          with open("docs/data/scan-stats.json", "w") as f:
              json.dump(stats, f, indent=2)

          print(f"Published {len(verified)} verified jobs from {stats['total_scanned']} scanned")
          PYEOF

      - name: Push to Worker API
        if: ${{ secrets.WORKER_INGEST_URL != '' && secrets.WORKER_INGEST_KEY != '' }}
        env:
          WORKER_INGEST_URL: ${{ secrets.WORKER_INGEST_URL }}
          WORKER_INGEST_KEY: ${{ secrets.WORKER_INGEST_KEY }}
        run: |
          python3 << 'PYEOF'
          import json, glob, os
          try:
              import httpx
          except ImportError:
              print("httpx not available, skipping Worker push")
              exit(0)

          files = sorted(glob.glob("scan-results/scan_*.json"))
          if not files:
              print("No scan results, skipping Worker push")
              exit(0)

          with open(files[-1]) as f:
              data = json.load(f)

          all_jobs = data.get("all_jobs", [])
          if not all_jobs:
              print("No jobs to push")
              exit(0)

          url = os.environ["WORKER_INGEST_URL"]
          key = os.environ["WORKER_INGEST_KEY"]

          batch_size = 100
          total_inserted = 0
          total_errors = 0

          with httpx.Client(timeout=30) as client:
              for i in range(0, len(all_jobs), batch_size):
                  batch = all_jobs[i:i + batch_size]
                  try:
                      resp = client.post(
                          f"{url}/api/jobs/ingest",
                          json={"jobs": batch},
                          headers={"Authorization": f"Bearer {key}"},
                      )
                      resp.raise_for_status()
                      result = resp.json()
                      total_inserted += result.get("inserted", 0)
                      total_errors += len(result.get("errors", []))
                      print(f"  Batch {i // batch_size + 1}: {result.get('inserted', 0)} inserted")
                  except Exception as e:
                      print(f"  Batch {i // batch_size + 1} failed: {e}")
                      total_errors += len(batch)

          print(f"\nWorker push complete: {total_inserted} inserted, {total_errors} errors")
          PYEOF

      - name: Commit scan data to docs
        run: |
          git config user.email "actions@github.com"
          git config user.name "github-actions[bot]"
          git add docs/data/
          git diff --staged --quiet || git commit -m "chore: update verified jobs data [skip ci]"
          git push
