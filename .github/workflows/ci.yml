name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-${{ matrix.python-version }}-
            pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run ruff linter
        run: |
          ruff check sentinel/ tests/
          ruff format --check sentinel/ tests/

      - name: Run test suite
        run: |
          python -m pytest tests/ -v \
            --tb=short \
            --junitxml=junit.xml \
            --cov=sentinel \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 14

      - name: Upload JUnit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-results-${{ matrix.python-version }}
          path: junit.xml
          retention-days: 14

      - name: Write job summary
        if: always()
        run: |
          python - <<'EOF'
          import xml.etree.ElementTree as ET, sys, os

          summary = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/stdout")

          try:
              tree = ET.parse("junit.xml")
              root = tree.getroot()
              suite = root.find("testsuite") or root

              tests    = int(suite.get("tests",    0))
              failures = int(suite.get("failures", 0))
              errors   = int(suite.get("errors",   0))
              skipped  = int(suite.get("skipped",  0))
              passed   = tests - failures - errors - skipped

              status_icon = "✅" if (failures + errors) == 0 else "❌"
              lines = [
                  f"## {status_icon} Test Results",
                  "",
                  "| Metric | Count |",
                  "|--------|-------|",
                  f"| Total  | {tests} |",
                  f"| Passed | {passed} |",
                  f"| Failed | {failures} |",
                  f"| Errors | {errors} |",
                  f"| Skipped | {skipped} |",
              ]
          except Exception as exc:
              lines = [f"## Test Results\n\nCould not parse junit.xml: {exc}"]

          with open(summary, "a") as fh:
              fh.write("\n".join(lines) + "\n")
          EOF
