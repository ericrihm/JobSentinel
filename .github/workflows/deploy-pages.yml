name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; cancel in-flight deployments.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Cache-bust static assets
        run: |
          HASH=$(echo ${{ github.sha }} | cut -c1-8)
          echo "Cache-busting with hash: $HASH"
          for f in docs/*.html; do
            sed -i "s/style\.css?v=[a-f0-9]*/style.css?v=$HASH/g" "$f"
            sed -i "s/analyze-bridge\.js?v=[a-f0-9]*/analyze-bridge.js?v=$HASH/g" "$f"
          done
          if [ -f docs/analyze-bridge.js ]; then
            sed -i "s/signals-engine\.js?v=[a-f0-9]*/signals-engine.js?v=$HASH/g" docs/analyze-bridge.js
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Write deployment summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Deployment

          Site deployed successfully.

          **URL:** ${{ steps.deployment.outputs.page_url }}
          **Commit:** ${{ github.sha }}
          **Triggered by:** ${{ github.actor }}
          EOF
